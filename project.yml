name: FitnessStreaks
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YXG4MP6W39
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 76
    GENERATE_INFOPLIST_FILE: NO

schemes:
  FitnessStreaks:
    build:
      targets:
        FitnessStreaks: all
        FitnessStreaksWidget: all
        FitnessStreaksTests: [test]
    test:
      targets:
        - FitnessStreaksTests
    run:
      config: Debug
      storeKitConfiguration: FitnessStreaks/FitnessStreaks.storekit
  FitnessStreaksWatch:
    build:
      targets:
        FitnessStreaksWatch: all
        FitnessStreaksWatchWidget: all
    run:
      config: Debug

targets:
  FitnessStreaks:
    type: application
    platform: iOS
    sources:
      - path: FitnessStreaks
        excludes:
          - "FitnessStreaks.storekit"
      - path: FitnessStreaks/FitnessStreaks.storekit
        buildPhase: none
      - path: Shared
        excludes:
          - "Fonts"
      - path: Shared/Fonts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.streaks
        INFOPLIST_FILE: FitnessStreaks/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitnessStreaks/FitnessStreaks.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: FitnessStreaksWidget
        embed: true
      - target: FitnessStreaksWatch
        embed: true

  FitnessStreaksWatch:
    type: application
    platform: watchOS
    sources:
      - path: FitnessStreaksWatch
      - path: Shared
        excludes:
          - "Fonts"
      - path: Shared/Fonts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.streaks.watch
        INFOPLIST_FILE: FitnessStreaksWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitnessStreaksWatch/FitnessStreaksWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: FitnessStreaksWatchWidget
        embed: true

  FitnessStreaksWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: FitnessStreaksWidget
      - path: Shared
        excludes:
          - "Fonts"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.streaks.widget
        INFOPLIST_FILE: FitnessStreaksWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitnessStreaksWidget/FitnessStreaksWidget.entitlements

  FitnessStreaksWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: FitnessStreaksWatchWidget
      - path: Shared
        excludes:
          - "Fonts"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.streaks.watch.widget
        INFOPLIST_FILE: FitnessStreaksWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitnessStreaksWatchWidget/FitnessStreaksWatchWidget.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"

  FitnessStreaksTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FitnessStreaksTests
      - path: Shared
        excludes:
          - "Fonts"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.streaks.tests
        GENERATE_INFOPLIST_FILE: YES
